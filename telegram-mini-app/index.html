<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>eSIM</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: sans-serif; background: #f4f4f9; padding: 20px; color: #333; }
    .card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 2px solid #ddd; cursor: pointer; }
    .card.selected { border-color: #248bcf; background: #e8f4fd; }
    h2 { margin-bottom: 15px; font-size: 18px; }
    .price { float: right; font-weight: bold; color: #248bcf; }
  </style>
</head>
<body>
  <h2>OLKE SECIN</h2>
  <div id="countries">
    <div class="card" onclick="sel('Turkey 1GB - 0.81 USD', this)">Turkey 1GB <span class="price">0.81 USD</span></div>
    <div class="card" onclick="sel('Turkey 3GB - 2.43 USD', this)">Turkey 3GB <span class="price">2.43 USD</span></div>
    <div class="card" onclick="sel('Azerbaijan 1GB - 4.03 USD', this)">Azerbaijan 1GB <span class="price">4.03 USD</span></div>
    <div class="card" onclick="sel('UAE 1GB - 3.15 USD', this)">UAE 1GB <span class="price">3.15 USD</span></div>
  </div>

  <script>
    var tg = window.Telegram.WebApp;
    var data = "";
    
    tg.expand();
    tg.ready();

    function sel(val, el) {
      data = val;
      var cards = document.getElementsByClassName('card');
      for(var i=0; i<cards.length; i++) cards[i].classList.remove('selected');
      el.classList.add('selected');
      
      // Telegram-in oz esas duymesini aktiv edirik
      tg.MainButton.setText("SIFARISI TESDIQLE");
      tg.MainButton.show();
    }

    // Telegram duymesi basilanda
    tg.MainButton.onClick(function() {
      if(data) {
        tg.sendData(data);
        // Bezi versiyalarda sendData ozu baglamirsa, mecbur edirik:
        setTimeout(function() {
          tg.close();
        }, 100);
      }
    });
  </script>
</body>
</html>
