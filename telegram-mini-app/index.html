<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EyDost - eSIM Sifarişi</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, #EEF2FF 0%, #FFFFFF 100%);
      min-height: 100vh;
      color: #1f2937;
      padding-bottom: 100px;
    }
    .header {
      background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
      color: white;
      padding: 24px 20px 60px;
      text-align: center;
      border-radius: 0 0 32px 32px;
    }
    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.2);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 12px;
    }
    .header h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    .header p { font-size: 14px; opacity: 0.9; }
    .container { max-width: 480px; margin: 0 auto; padding: 0 16px; }
    .section-title { font-size: 18px; font-weight: 700; margin: 24px 0 16px; color: #1f2937; }
    .search-box { position: relative; margin-bottom: 16px; }
    .search-box input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      border: 2px solid #E5E7EB;
      border-radius: 14px;
      font-size: 15px;
      background: white;
      outline: none;
    }
    .search-box input:focus { border-color: #3B82F6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #9CA3AF; }
    .country-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .country-card {
      background: white;
      border: 2px solid #E5E7EB;
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .country-card:hover, .country-card.selected {
      border-color: #3B82F6;
      background: #F0F7FF;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.15);
    }
    .country-card.selected {
      background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
      color: white;
    }
    .country-flag { font-size: 36px; margin-bottom: 8px; }
    .country-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
    .country-price { font-size: 12px; opacity: 0.7; }
    .selected-country {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-top: -40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      position: relative;
      z-index: 10;
    }
    .selected-country-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #E5E7EB;
    }
    .selected-country-flag { font-size: 48px; }
    .selected-country-info h3 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .selected-country-info p { font-size: 13px; color: #6B7280; }
    .plans-grid { display: flex; flex-direction: column; gap: 12px; }
    .plan-card {
      background: #F9FAFB;
      border: 2px solid #E5E7EB;
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .plan-card:hover { border-color: #3B82F6; }
    .plan-card.selected {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(29, 78, 216, 0.1) 100%);
      border-color: #3B82F6;
    }
    .plan-radio {
      width: 22px;
      height: 22px;
      border: 2px solid #D1D5DB;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .plan-card.selected .plan-radio { border-color: #3B82F6; background: #3B82F6; }
    .plan-radio::after {
      content: '';
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .plan-card.selected .plan-radio::after { opacity: 1; }
    .plan-info { flex: 1; }
    .plan-data { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .plan-card.selected .plan-data { color: #1D4ED8; }
    .plan-duration { font-size: 13px; color: #6B7280; }
    .plan-price { font-size: 18px; font-weight: 700; }
    .plan-card.selected .plan-price { color: #3B82F6; }
    .best-value {
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 6px;
      text-transform: uppercase;
    }
    .action-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      padding: 16px 20px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
      border-radius: 24px 24px 0 0;
    }
    .action-btn {
      width: 100%;
      background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 16px 24px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .action-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4); }
    .action-btn:disabled { background: #D1D5DB; cursor: not-allowed; transform: none; box-shadow: none; }
    .action-btn svg { width: 22px; height: 22px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-badge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
      eSIM Mini App
    </div>
    <h1>eSIM Sifarişi</h1>
    <p>Ölkənizi seçin və ani qoşulma əldə edin</p>
  </div>

  <div class="container">
    <h2 class="section-title">Populyar Ölkələr</h2>
    <div class="country-grid" id="popularCountries"></div>

    <h2 class="section-title">Bütün Ölkələr</h2>
    <div class="search-box">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Ölkə axtar...">
    </div>
    <div class="country-grid" id="allCountries"></div>
  </div>

  <div class="container">
    <div class="selected-country hidden" id="selectedCountrySection">
      <div class="selected-country-header">
        <div class="selected-country-flag" id="selectedFlag">🇹🇷</div>
        <div class="selected-country-info">
          <h3 id="selectedName">Türkiyə</h3>
          <p>eSIM Paketləri</p>
        </div>
      </div>
      <div class="plans-grid" id="plansGrid"></div>
    </div>
  </div>

  <div class="action-bar">
    <!-- Telegram Düyməsi (Yalnız Mini App-da görünəcək) -->
    <button class="action-btn hidden" id="orderBtn" disabled>
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057c.003.022.015.043.032.056a19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03z"/>
      </svg>
      <span>Sifariş Et (Telegram)</span>
    </button>

    <!-- WhatsApp Düyməsi (Yalnız Brauzerdə görünəcək) -->
    <button class="action-btn hidden" id="whatsappBtn" style="background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);" disabled>
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
      </svg>
      <span>Sifariş Et (WhatsApp)</span>
    </button>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    const BOT_USERNAME = 'eydost_esim_bot';
    const WHATSAPP_NUMBER = '994502544444'; 
    let selectedCountry = null;
    let selectedPlan = null;

    // Telegram Mini App detection
    const isMiniApp = tg && tg.initData !== "";
    
    if (isMiniApp) {
      document.getElementById('orderBtn').classList.remove('hidden');
    } else {
      document.getElementById('whatsappBtn').classList.remove('hidden');
    }

    function handleOrder() {
      if (!selectedCountry || !selectedPlan) return;
      const msg = `Salam! eSIM sifarişi etmək istəyirəm:\n\nÖlkə: ${selectedCountry.flag} ${selectedCountry.nameAz}\nPaket: ${selectedPlan.gb}GB / ${selectedPlan.days} gün\nKod: ${selectedPlan.code}\nQiymət: ${selectedPlan.price}`;
      if (tg && tg.sendData) {
        tg.sendData(msg);
      }
    }

    function handleWhatsApp() {
      if (!selectedCountry || !selectedPlan) return;
      const msg = `Salam! eSIM sifarişi etmək istəyirəm:\n\nÖlkə: ${selectedCountry.flag} ${selectedCountry.nameAz}\nPaket: ${selectedPlan.gb}GB / ${selectedPlan.days} gün\nKod: ${selectedPlan.code}\nQiymət: ${selectedPlan.price}`;
      window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    const countries = [
      { flag: '🇹🇷', name: 'Turkey', nameAz: 'Türkiyə', code: 'TR', plans: [{gb:1,days:7,price:'$0.81',code:'TR1G7'},{gb:3,days:15,price:'$2.43',code:'TR3G15'},{gb:5,days:30,price:'$4.03',code:'TR5G30'},{gb:10,days:30,price:'$7.35',code:'TR10G30'},{gb:20,days:30,price:'$12.25',code:'TR20G30'}] },
      { flag: '🇫🇷', name: 'France', nameAz: 'Fransa', code: 'FR', plans: [{gb:1,days:7,price:'$1.23',code:'FR1G7'},{gb:3,days:15,price:'$2.98',code:'FR3G15'},{gb:5,days:30,price:'$4.73',code:'FR5G30'},{gb:10,days:30,price:'$8.23',code:'FR10G30'},{gb:20,days:30,price:'$14.35',code:'FR20G30'}] },
      { flag: '🇩🇪', name: 'Germany', nameAz: 'Almaniya', code: 'DE', plans: [{gb:1,days:7,price:'$1.23',code:'DE1G7'},{gb:3,days:15,price:'$2.98',code:'DE3G15'},{gb:5,days:30,price:'$4.73',code:'DE5G30'},{gb:10,days:30,price:'$8.23',code:'DE10G30'},{gb:20,days:30,price:'$14.35',code:'DE20G30'}] },
      { flag: '🇬🇧', name: 'United Kingdom', nameAz: 'Böyük Britaniya', code: 'UK', plans: [{gb:1,days:7,price:'$1.23',code:'UK1G7'},{gb:3,days:15,price:'$2.98',code:'UK3G15'},{gb:5,days:30,price:'$4.73',code:'UK5G30'},{gb:10,days:30,price:'$8.23',code:'UK10G30'},{gb:20,days:30,price:'$14.35',code:'UK20G30'}] },
      { flag: '🇺🇸', name: 'United States', nameAz: 'ABŞ', code: 'US', plans: [{gb:1,days:7,price:'$1.58',code:'US1G7'},{gb:3,days:15,price:'$3.85',code:'US3G15'},{gb:5,days:30,price:'$5.95',code:'US5G30'},{gb:10,days:30,price:'$10.68',code:'US10G30'},{gb:20,days:30,price:'$18.55',code:'US20G30'}] },
      { flag: '🇦🇿', name: 'Azerbaijan', nameAz: 'Azərbaycan', code: 'AZ', plans: [{gb:1,days:7,price:'$4.03',code:'AZ1G7'},{gb:3,days:15,price:'$9.98',code:'AZ3G15'},{gb:5,days:30,price:'$15.40',code:'AZ5G30'},{gb:10,days:30,price:'$26.60',code:'AZ10G30'},{gb:20,days:30,price:'$43.75',code:'AZ20G30'}] },
      { flag: '🇦🇪', name: 'UAE', nameAz: 'BƏƏ', code: 'AE', plans: [{gb:1,days:7,price:'$3.15',code:'AE1G7'},{gb:3,days:15,price:'$8.05',code:'AE3G15'},{gb:5,days:30,price:'$12.25',code:'AE5G30'},{gb:10,days:30,price:'$21.35',code:'AE10G30'},{gb:20,days:30,price:'$35.00',code:'AE20G30'}] }
    ];

    function createCountryCard(c) {
      return `<div class="country-card" onclick="selectCountry('${c.code}')">
        <div class="country-flag">${c.flag}</div>
        <div class="country-name">${c.nameAz}</div>
        <div class="country-price">${c.plans[0].gb}GB dan</div>
      </div>`;
    }

    function renderCountries() {
      const html = countries.map(createCountryCard).join('');
      document.getElementById('popularCountries').innerHTML = html;
      document.getElementById('allCountries').innerHTML = html;
    }

    function selectCountry(code) {
      selectedCountry = countries.find(c => c.code === code);
      selectedPlan = null;
      document.getElementById('selectedCountrySection').classList.remove('hidden');
      document.getElementById('selectedFlag').textContent = selectedCountry.flag;
      document.getElementById('selectedName').textContent = selectedCountry.nameAz;
      
      const plansHtml = selectedCountry.plans.map((p, i) => `
        <div class="plan-card" id="plan-${i}" onclick="selectPlan(${i})">
          <div class="plan-radio"></div>
          <div class="plan-info">
            <div class="plan-data">${p.gb} GB</div>
            <div class="plan-duration">${p.days} gün</div>
          </div>
          <div class="plan-price">${p.price}</div>
        </div>
      `).join('');
      document.getElementById('plansGrid').innerHTML = plansHtml;
      document.getElementById('orderBtn').disabled = true;
      document.getElementById('whatsappBtn').disabled = true;
    }

    function selectPlan(i) {
      selectedPlan = selectedCountry.plans[i];
      document.querySelectorAll('.plan-card').forEach(el => el.classList.remove('selected'));
      document.getElementById(`plan-${i}`).classList.add('selected');
      document.getElementById('orderBtn').disabled = false;
      document.getElementById('whatsappBtn').disabled = false;
    }

    document.getElementById('orderBtn').addEventListener('click', handleOrder);
    document.getElementById('whatsappBtn').addEventListener('click', handleWhatsApp);
    
    if (isMiniApp) {
      tg.ready();
      tg.expand();
    }
    
    renderCountries();
  </script>
</body>
</html>
