<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EyDost eSIM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #ffffff; color: #000; }
        .card { border: 1px solid #ccc; padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; text-align: left; }
        .card.selected { border-color: #000; background: #f0f0f0; }
        .btn { background: #000; color: #fff; padding: 15px; border-radius: 8px; width: 100%; border: none; font-size: 16px; margin-top: 20px; cursor: pointer; }
        .price { float: right; font-weight: bold; }
    </style>
</head>
<body>
    <h3>PAKET SECIN</h3>
    <div id="plans">
        <div class="card" onclick="select(this, 'Turkey 1GB - 0.81 USD')">
            <span>Turkey 1GB</span>
            <span class="price">0.81 USD</span>
        </div>
        <div class="card" onclick="select(this, 'Turkey 3GB - 2.43 USD')">
            <span>Turkey 3GB</span>
            <span class="price">2.43 USD</span>
        </div>
        <div class="card" onclick="select(this, 'Azerbaijan 1GB - 4.03 USD')">
            <span>Azerbaijan 1GB</span>
            <span class="price">4.03 USD</span>
        </div>
    </div>
    <button class="btn" id="mainBtn" style="display:none;" onclick="send()">SIFARISI TESDIQLE</button>

    <script>
        var tg = window.Telegram.WebApp;
        var selectedValue = "";
        
        tg.expand();
        tg.ready();

        function select(el, val) {
            selectedValue = val;
            var cards = document.getElementsByClassName('card');
            for(var i=0; i<cards.length; i++) { cards[i].classList.remove('selected'); }
            el.classList.add('selected');
            document.getElementById('mainBtn').style.display = "block";
            
            tg.MainButton.text = "TESDIQLE: " + val;
            tg.MainButton.show();
        }

        tg.MainButton.onClick(function() {
            send();
        });

        function send() {
            if(!selectedValue) return;
            
            // Telegram API-ni baglamaga mecbur edirik
            try {
                tg.sendData(selectedValue);
                tg.close();
            } catch (e) {
                tg.close();
            }
            
            // Ehtiyat ucun ikinci defe baglama emri
            setTimeout(function() {
                tg.close();
            }, 100);
        }
    </script>
</body>
</html>
